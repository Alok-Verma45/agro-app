spring:
  application:
    name: agro-app

  datasource:
    url: jdbc:postgresql://localhost:5432/agro_app
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect